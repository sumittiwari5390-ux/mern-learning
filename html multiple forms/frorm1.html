<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form>

        <h1>Event Registration</h1>


    <label for="name">Name:</label>
    <br>
    <br>
    <input type="text" id="name">
    <br>
    
    <label for="email">Email:</label>
    <br>
    <br>
    <input type="email" id="email">
    <br>
    
    <label for="phone">Phone:</label>
    <br>
    <br>
    <input type="tel" id="phone">
    <br>


    <label for="occupation">Occupation:</label>
    <br>
    <br>
    <select name="other" id="occupation">
        <option value="student">Student</option>
        <option value="proffesional">Proffesional</option>
        <option value="other">Other</option>
    </select>
    <br>


     <label for="interest">Topics of Interest:</label>
    <br>
    <br>
    <input type="checkbox" name="HTML" id="html">
    <br>
    <label for="html">HTML</label>
    <br>
    <br>
    <input type="checkbox" name="CSS" id="css">
    <br>
    <label for="css">CSS</label>
    <br>
    <br>
    <input type="checkbox" name="JavaScript" id="javascript">
    <br>
    <label for="javascript">JavaScript</label>
    <br>
    <br>


<label for="comments">Comments:</label>
<br>
<textarea name="textarea1" id="comments" rows="3" cols="50"></textarea>
<input type="submit" value="Register">

    </form>

</body>
</html>
